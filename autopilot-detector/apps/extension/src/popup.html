<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autopilot</title>
    <style>
      :root {
        --bg-color: #fef08a; /* yellow-200 */
        --card-bg: #ffffff;
        --text-primary: #000000;
        --text-secondary: #4b5563;
        --accent-blue: #3b82f6;
        --accent-purple: #a855f7;
        --good-color: #10b981;
        --warn-color: #f59e0b;
        --danger-color: #ef4444;
        --neo-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
      }
      
      body {
        width: 320px;
        min-height: 400px;
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        background-color: var(--bg-color);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 4px solid black;
      }

      /* Animated Gradient Header */
      .header-bar {
        height: 6px;
        width: 100%;
        background: black;
      }

      .container {
        padding: 24px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      h1 {
        font-size: 24px;
        font-weight: 900;
        margin: 0 0 8px 0;
        text-transform: uppercase;
        letter-spacing: -0.5px;
        background: black;
        color: white;
        padding: 4px 8px;
        display: inline-block;
        transform: rotate(-2deg);
        border: 2px solid black;
      }

      p.subtitle {
        font-weight: 700;
        color: black;
        font-size: 14px;
        margin: 12px 0 24px 0;
        line-height: 1.5;
        border-left: 4px solid black;
        padding-left: 8px;
      }

      /* Views */
      .view {
        display: none;
        flex-direction: column;
        flex: 1;
      }
      
      .view.active {
        display: flex;
      }

      /* Intent Buttons */
      .intent-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      button.intent-btn {
        background: var(--card-bg);
        border: 4px solid black;
        color: var(--text-primary);
        padding: 12px 16px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 900;
        text-transform: uppercase;
        text-align: left;
        cursor: pointer;
        transition: all 0.1s ease;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: var(--neo-shadow);
      }

      button.intent-btn:hover {
        background: #bfdbfe; /* blue-200 */
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
      }
      
      button.intent-btn:active {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
      }

      /* Dashboard */
      .score-display {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .score-circle {
        width: 140px;
        height: 140px;
        background: var(--card-bg);
        border: 8px solid black;
        box-shadow: var(--neo-shadow);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        position: relative;
        transition: background-color 0.5s ease;
        border-radius: 0; /* brutalist square instead of circle */
        transform: rotate(2deg);
      }

      .score-value {
        font-size: 48px;
        font-weight: 900;
        line-height: 1;
      }

      .score-label {
        font-size: 14px;
        font-weight: 900;
        color: black;
        margin-top: 4px;
        text-transform: uppercase;
        background: #fef08a;
        padding: 2px 4px;
        border: 2px solid black;
      }

      .status-text {
        font-size: 18px;
        font-weight: 900;
        text-transform: uppercase;
        text-align: center;
        padding: 8px;
        border: 4px solid black;
        background: white;
        box-shadow: var(--neo-shadow);
      }

      /* Score states */
      .score-good { background: var(--good-color); color: white; }
      .text-good { color: black; background: var(--good-color); }
      
      .score-warn { background: var(--warn-color); color: black; }
      .text-warn { color: black; background: var(--warn-color); }
      
      .score-danger { background: var(--danger-color); color: white; }
      .text-danger { color: white; background: var(--danger-color); }

      /* Footer */
      .footer {
        margin-top: auto;
        padding-top: 16px;
        text-align: center;
      }
      
      .reset-btn {
        background: black;
        border: 2px solid black;
        color: white;
        font-weight: 900;
        font-family: inherit;
        text-transform: uppercase;
        font-size: 12px;
        cursor: pointer;
        padding: 8px 16px;
        box-shadow: 2px 2px 0px 0px rgba(255,255,255,1);
        transition: all 0.1s;
      }
      
      .reset-btn:hover {
        transform: translate(-1px, -1px);
        box-shadow: 3px 3px 0px 0px rgba(255,255,255,1);
      }
    </style>
  </head>
  <body>
    <div class="header-bar"></div>
    
    <div class="container">
      <!-- VIEW: INTENT SELECTION -->
      <div id="view-intent" class="view active">
        <h1>Welcome Back</h1>
        <p class="subtitle">Set your primary intent for this session so we can calibrate your autopilot detector.</p>
        
        <div class="intent-grid">
          <button class="intent-btn" data-intent="STUDY">Study / Deep Work <span>📚</span></button>
          <button class="intent-btn" data-intent="PRODUCTIVITY">Productivity <span>⚡</span></button>
          <button class="intent-btn" data-intent="TUTORIAL">Learning / Tutorial <span>🧠</span></button>
          <button class="intent-btn" data-intent="ENTERTAINMENT">Entertainment <span>🎬</span></button>
        </div>
      </div>

      <!-- VIEW: LIVE DASHBOARD -->
      <div id="view-dashboard" class="view">
        <h1>Live Dashboard</h1>
        <p class="subtitle" id="intent-display">Intent: <span id="current-intent">None</span></p>
        
        <div class="score-display">
          <div class="score-circle" id="score-ring">
            <div class="score-value" id="score-value">--</div>
            <div class="score-label">Score</div>
          </div>
          <div class="status-text" id="status-text">Calculating baseline...</div>
        </div>
        
        <div class="footer">
          <button class="reset-btn" id="reset-intent-btn" style="margin-bottom: 8px;">Change Intent</button><br/>
          <a href="http://localhost:3000/dashboard" target="_blank" style="color: black; font-weight: bold; font-size: 12px; text-decoration: none; padding: 4px; display: inline-block;">Open Dashboard ↗</a>
        </div>
      </div>
    </div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
